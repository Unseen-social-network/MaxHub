name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/unseen-social-network/maxhub

jobs:
  deploy:
    # Деплоим только когда CI отработал успешно и запускался пушем тега
    # (для push тега head_branch = имя тега, напр. "v1.0.0"; для PR/веток — нет).
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build timestamp
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ env.TAG }}
            GIT_SHA=${{ github.event.workflow_run.head_sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}

      - name: Обновить docker-compose.prod.nginx.yml на сервере
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker/docker-compose.prod.nginx.yml"
          target: ${{ secrets.DEPLOY_PATH || '/opt/max-bot' }}
          strip_components: 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/max-bot' }}
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ env.TAG }}/" .env
            docker compose -f docker-compose.prod.nginx.yml pull
            docker compose -f docker-compose.prod.nginx.yml up -d
            docker image prune -f
