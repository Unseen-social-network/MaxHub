name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: maxhub
          POSTGRES_PASSWORD: maxhub
          POSTGRES_DB: maxhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BOT_TOKEN: test-token
      DOMAIN: example.com
      WEBHOOK_PATH: /webhook
      PORT: "8080"
      MODE: polling
      ADMIN_IDS: "1"
      DATABASE_URL: postgresql+asyncpg://maxhub:maxhub@localhost:5432/maxhub

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          build-args: |
            APP_VERSION=ci
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=ci
