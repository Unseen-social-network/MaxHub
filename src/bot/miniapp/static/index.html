<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MaxHub</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1c1e21;
      --muted: #6b7280;
      --accent: #2f6fed;
      --border: #e3e5e8;
      --danger: #d64545;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #15161a;
        --card: #1f2126;
        --text: #f2f3f5;
        --muted: #9aa0aa;
        --accent: #5b8def;
        --border: #2c2f36;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    #app { max-width: 480px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    section h2 { margin: 0 0 12px; font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    ul { list-style: none; margin: 0; padding: 0; }
    li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    li:last-child { border-bottom: none; }
    li.done { color: var(--muted); text-decoration: line-through; }
    li .todo-text { flex: 1; }
    .empty { color: var(--muted); font-size: 14px; }
    .icon-btn {
      padding: 4px 8px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button {
      font: inherit;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    button:disabled { opacity: 0.5; cursor: default; }
    textarea {
      width: 100%;
      min-height: 90px;
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 10px;
      resize: vertical;
    }
    input[type="text"], select {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 10px;
    }
    label.checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }
    .drink-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .drink-meta { flex: 1; }
    .word-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .word-example { color: var(--muted); font-style: italic; margin-top: 8px; }
    .error { color: var(--danger); font-size: 14px; margin-top: 8px; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
  <div id="app">
    <h1>MaxHub</h1>

    <section id="todo-section">
      <h2>Список дел</h2>
      <ul id="todo-list"><li class="empty">Загрузка…</li></ul>
      <div class="row" style="margin-top: 12px; gap: 8px;">
        <input id="todo-input" type="text" placeholder="Новое дело…" style="flex: 1;" />
        <button id="todo-add">Добавить</button>
      </div>
      <div id="todo-error" class="error"></div>
    </section>

    <section id="word-section">
      <h2>Слово дня</h2>
      <div id="word-body">Загрузка…</div>
      <div class="row" style="margin-top: 12px;">
        <button id="word-toggle" class="secondary" disabled>…</button>
      </div>
    </section>

    <section id="drinks-section">
      <h2>Напитки</h2>

      <div class="row" style="gap: 8px; flex-wrap: wrap;">
        <input id="drinks-search" type="text" placeholder="Поиск…" style="flex: 1; min-width: 120px;" />
        <button id="drinks-search-btn" class="secondary">Найти</button>
      </div>

      <div class="row" style="gap: 8px; margin-top: 8px; flex-wrap: wrap;">
        <select id="drinks-category-filter" style="flex: 1;">
          <option value="">Все категории</option>
        </select>
        <select id="drinks-sort" style="flex: 1;">
          <option value="created_at">По дате</option>
          <option value="rating">По оценке</option>
          <option value="name">По названию</option>
          <option value="favorite">Сначала избранные</option>
        </select>
        <button id="drinks-order-toggle" class="secondary" title="Порядок сортировки">⬇</button>
      </div>

      <label class="checkbox-row" style="margin-top: 8px;">
        <input id="drinks-favorite-filter" type="checkbox" />
        Только избранное
      </label>

      <ul id="drinks-list" style="margin-top: 12px;"><li class="empty">Загрузка…</li></ul>
      <div id="drinks-error" class="error"></div>

      <hr style="border: none; border-top: 1px solid var(--border); margin: 16px 0;" />

      <h2>Добавить рецензию</h2>
      <input
        id="drink-category"
        list="drink-category-options"
        type="text"
        placeholder="Категория (вино, пиво, чай…)"
        style="width: 100%; margin-bottom: 8px;"
      />
      <datalist id="drink-category-options"></datalist>
      <input
        id="drink-name"
        type="text"
        placeholder="Название напитка"
        style="width: 100%; margin-bottom: 8px;"
      />
      <textarea id="drink-note" placeholder="Описание/заметка (необязательно)"></textarea>
      <div class="row" style="margin-top: 8px; justify-content: flex-start; gap: 16px;">
        <label class="checkbox-row">
          Оценка:
          <select id="drink-rating">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10" selected>10</option>
          </select>
        </label>
        <label class="checkbox-row">
          <input id="drink-favorite" type="checkbox" />
          Фаворит
        </label>
      </div>
      <div class="row" style="margin-top: 12px;">
        <button id="drink-add">Добавить рецензию</button>
      </div>
      <div id="drink-add-error" class="error"></div>
    </section>

    <section id="broadcast-section" hidden>
      <h2>Рассылка</h2>
      <div id="broadcast-summary" class="empty"></div>
      <textarea id="broadcast-text" placeholder="Текст рассылки…"></textarea>
      <div class="row" style="margin-top: 12px;">
        <button id="broadcast-send">Отправить</button>
      </div>
      <div id="broadcast-status" class="empty"></div>
    </section>
  </div>

  <script>
    const initData = window.WebApp ? window.WebApp.initData : "";

    async function api(path, options) {
      const response = await fetch(path, {
        ...options,
        headers: {
          "X-Init-Data": initData,
          "Content-Type": "application/json",
          ...(options && options.headers ? options.headers : {}),
        },
      });
      if (!response.ok) {
        const detail = await response.text();
        throw new Error(detail || `HTTP ${response.status}`);
      }
      return response.json();
    }

    async function loadTodos() {
      const list = document.getElementById("todo-list");
      try {
        const data = await api("api/todos");
        const pending = data.todos.filter((todo) => !todo.is_done);
        if (pending.length === 0) {
          list.innerHTML = '<li class="empty">Список дел пуст</li>';
          return;
        }
        list.innerHTML = pending
          .map(
            (todo) => `
              <li data-id="${todo.id}">
                <span class="todo-text">${escapeHtml(todo.text)}</span>
                <button class="icon-btn todo-done" title="Готово">✅</button>
                <button class="icon-btn todo-delete" title="Удалить">🗑</button>
              </li>
            `
          )
          .join("");
      } catch (err) {
        list.innerHTML = `<li class="error">${escapeHtml(err.message)}</li>`;
      }
    }

    document.getElementById("todo-list").addEventListener("click", async (event) => {
      const button = event.target.closest("button.todo-done, button.todo-delete");
      if (!button) return;
      const li = button.closest("li[data-id]");
      if (!li) return;
      const todoId = li.dataset.id;
      const error = document.getElementById("todo-error");
      button.disabled = true;
      error.textContent = "";
      try {
        if (button.classList.contains("todo-done")) {
          await api(`api/todos/${todoId}/done`, { method: "POST" });
        } else {
          await api(`api/todos/${todoId}`, { method: "DELETE" });
        }
        await loadTodos();
      } catch (err) {
        error.textContent = err.message;
        button.disabled = false;
      }
    });

    document.getElementById("todo-add").addEventListener("click", async () => {
      const input = document.getElementById("todo-input");
      const error = document.getElementById("todo-error");
      const button = document.getElementById("todo-add");
      const text = input.value.trim();
      if (!text) {
        error.textContent = "Введите текст дела";
        return;
      }
      button.disabled = true;
      error.textContent = "";
      try {
        await api("api/todos", { method: "POST", body: JSON.stringify({ text }) });
        input.value = "";
        await loadTodos();
      } catch (err) {
        error.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });

    let wordSubscribed = false;

    async function loadWord() {
      const body = document.getElementById("word-body");
      const toggle = document.getElementById("word-toggle");
      try {
        const data = await api("api/word");
        wordSubscribed = data.subscribed;
        body.innerHTML = `
          <div class="word-title">${escapeHtml(data.word)}</div>
          <div>${escapeHtml(data.definition)}</div>
          <div class="word-example">${escapeHtml(data.example)}</div>
        `;
        toggle.disabled = false;
        toggle.textContent = wordSubscribed ? "Отписаться от рассылки" : "Подписать чат";
      } catch (err) {
        body.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    document.getElementById("word-toggle").addEventListener("click", async () => {
      const toggle = document.getElementById("word-toggle");
      toggle.disabled = true;
      try {
        const path = wordSubscribed ? "api/word/unsubscribe" : "api/word/subscribe";
        const data = await api(path, { method: "POST" });
        wordSubscribed = data.subscribed;
        toggle.textContent = wordSubscribed ? "Отписаться от рассылки" : "Подписать чат";
      } finally {
        toggle.disabled = false;
      }
    });

    async function loadBroadcastPanel() {
      const section = document.getElementById("broadcast-section");
      try {
        const data = await api("api/broadcast/summary");
        section.hidden = false;
        document.getElementById("broadcast-summary").textContent =
          `Активных получателей: ${data.active_recipients}`;
      } catch (err) {
        section.hidden = true;
      }
    }

    document.getElementById("broadcast-send").addEventListener("click", async () => {
      const textarea = document.getElementById("broadcast-text");
      const status = document.getElementById("broadcast-status");
      const button = document.getElementById("broadcast-send");
      const text = textarea.value.trim();
      if (!text) {
        status.textContent = "Введите текст рассылки";
        status.className = "error";
        return;
      }
      button.disabled = true;
      status.className = "empty";
      status.textContent = "Отправка…";
      try {
        await api("api/broadcast", { method: "POST", body: JSON.stringify({ text }) });
        status.textContent = "Рассылка запущена";
        textarea.value = "";
      } catch (err) {
        status.className = "error";
        status.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }

    const drinksView = {
      search: "",
      category: "",
      favorite: false,
      sort: "created_at",
      order: "desc",
    };

    async function loadDrinkCategories() {
      try {
        const data = await api("api/drinks/categories");
        const select = document.getElementById("drinks-category-filter");
        const datalist = document.getElementById("drink-category-options");
        const current = select.value;
        select.innerHTML =
          '<option value="">Все категории</option>' +
          data.categories
            .map((c) => `<option value="${escapeHtml(c.value)}">${escapeHtml(c.label)}</option>`)
            .join("");
        select.value = current;
        datalist.innerHTML = data.categories
          .map((c) => `<option value="${escapeHtml(c.label)}"></option>`)
          .join("");
      } catch (err) {
        // Список категорий — подсказка, а не критичная функция.
      }
    }

    async function loadDrinks() {
      const list = document.getElementById("drinks-list");
      const error = document.getElementById("drinks-error");
      error.textContent = "";
      try {
        const params = new URLSearchParams();
        if (drinksView.search) params.set("search", drinksView.search);
        if (drinksView.category) params.set("category", drinksView.category);
        if (drinksView.favorite) params.set("favorite", "true");
        params.set("sort", drinksView.sort);
        params.set("order", drinksView.order);

        const data = await api(`api/drinks?${params.toString()}`);
        if (data.drinks.length === 0) {
          list.innerHTML = '<li class="empty">Ничего не найдено</li>';
          return;
        }
        list.innerHTML = data.drinks
          .map(
            (drink) => `
              <li data-id="${drink.id}">
                <div class="drink-meta">
                  <div><strong>${escapeHtml(drink.name)}</strong> — ${escapeHtml(drink.category_display)} · ${drink.rating}/10</div>
                  ${drink.note ? `<div class="drink-note">${escapeHtml(drink.note)}</div>` : ""}
                </div>
                <button class="icon-btn drink-fav" title="Фаворит">${drink.is_favorite ? "❤" : "🤍"}</button>
                <button class="icon-btn drink-delete" title="Удалить">🗑</button>
              </li>
            `
          )
          .join("");
      } catch (err) {
        list.innerHTML = "";
        error.textContent = err.message;
      }
    }

    document.getElementById("drinks-list").addEventListener("click", async (event) => {
      const button = event.target.closest("button.drink-fav, button.drink-delete");
      if (!button) return;
      const li = button.closest("li[data-id]");
      if (!li) return;
      const id = li.dataset.id;
      const error = document.getElementById("drinks-error");
      button.disabled = true;
      error.textContent = "";
      try {
        if (button.classList.contains("drink-fav")) {
          const isFavorite = button.textContent.trim() === "❤";
          await api(`api/drinks/${id}`, {
            method: "PATCH",
            body: JSON.stringify({ is_favorite: !isFavorite }),
          });
        } else {
          await api(`api/drinks/${id}`, { method: "DELETE" });
        }
        await loadDrinks();
        await loadDrinkCategories();
      } catch (err) {
        error.textContent = err.message;
        button.disabled = false;
      }
    });

    document.getElementById("drinks-search-btn").addEventListener("click", () => {
      drinksView.search = document.getElementById("drinks-search").value.trim();
      loadDrinks();
    });

    document.getElementById("drinks-category-filter").addEventListener("change", (event) => {
      drinksView.category = event.target.value;
      loadDrinks();
    });

    document.getElementById("drinks-favorite-filter").addEventListener("change", (event) => {
      drinksView.favorite = event.target.checked;
      loadDrinks();
    });

    document.getElementById("drinks-sort").addEventListener("change", (event) => {
      drinksView.sort = event.target.value;
      loadDrinks();
    });

    document.getElementById("drinks-order-toggle").addEventListener("click", (event) => {
      drinksView.order = drinksView.order === "desc" ? "asc" : "desc";
      event.target.textContent = drinksView.order === "desc" ? "⬇" : "⬆";
      loadDrinks();
    });

    document.getElementById("drink-add").addEventListener("click", async () => {
      const categoryInput = document.getElementById("drink-category");
      const nameInput = document.getElementById("drink-name");
      const noteInput = document.getElementById("drink-note");
      const ratingSelect = document.getElementById("drink-rating");
      const favoriteInput = document.getElementById("drink-favorite");
      const error = document.getElementById("drink-add-error");
      const button = document.getElementById("drink-add");

      const category = categoryInput.value.trim();
      const name = nameInput.value.trim();
      if (!category) {
        error.textContent = "Укажите категорию";
        return;
      }
      if (!name) {
        error.textContent = "Укажите название";
        return;
      }

      button.disabled = true;
      error.textContent = "";
      try {
        await api("api/drinks", {
          method: "POST",
          body: JSON.stringify({
            category,
            name,
            note: noteInput.value.trim(),
            rating: Number(ratingSelect.value),
            is_favorite: favoriteInput.checked,
          }),
        });
        categoryInput.value = "";
        nameInput.value = "";
        noteInput.value = "";
        ratingSelect.value = "10";
        favoriteInput.checked = false;
        await loadDrinks();
        await loadDrinkCategories();
      } catch (err) {
        error.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });

    loadTodos();
    loadWord();
    loadBroadcastPanel();
    loadDrinkCategories();
    loadDrinks();
  </script>
</body>
</html>
